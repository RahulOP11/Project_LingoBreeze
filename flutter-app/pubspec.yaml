name: lingobreeze
description: "LingoBreeze Vocabulary App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.8.0+1

  # Firebase
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0

  # Functional Programming
  dartz: ^0.10.1

  # Equality
  equatable: ^2.0.7

  # JSON
  json_annotation: ^4.9.0

  # Models
  freezed_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.5.4
  json_serializable: ^6.9.5

  # Freezed
  freezed: ^3.0.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/lingobreeze_logo.png